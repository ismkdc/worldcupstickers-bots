services:
  toyzz-watcher:
    build:
      context: .
      network: host
    image: toyzz-watcher:latest
    container_name: toyzz-watcher
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    environment:
      CHECK_INTERVAL_SECONDS: "60"
    volumes:
      - ./data:/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
